<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Clawdmeter Web</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen hero-screen">
      <div class="screen-chrome">
        <span></span><span></span><span></span>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Clawdmeter Web</p>
        <h1>Claude<br>Code</h1>
        <p class="subtitle">iPhone 横画面用<br>pixel dashboard</p>
      </div>
      <div class="status-row">
        <span id="status-dot" class="status-dot waiting"></span>
        <span id="status-text">待機中</span>
        <span class="spacer"></span>
        <span id="updated-at">--:--</span>
      </div>
    </section>

    <section class="screen mascot-screen" aria-label="Clawd pixel mascot">
      <div class="pixel-grid-bg"></div>
      <svg class="clawd-pixel" viewBox="0 0 160 160" role="img" aria-label="Orange Clawd mascot" shape-rendering="crispEdges">
        <rect width="160" height="160" fill="transparent"/>
        <rect x="48" y="16" width="64" height="16" class="p orange-dark"/>
        <rect x="32" y="32" width="96" height="16" class="p orange"/>
        <rect x="24" y="48" width="112" height="16" class="p orange"/>
        <rect x="16" y="64" width="128" height="16" class="p orange-light"/>
        <rect x="16" y="80" width="128" height="16" class="p orange"/>
        <rect x="24" y="96" width="112" height="16" class="p orange-dark"/>
        <rect x="40" y="112" width="80" height="16" class="p orange"/>
        <rect x="56" y="128" width="48" height="16" class="p orange-dark"/>
        <rect x="32" y="40" width="16" height="16" class="p orange-dark"/>
        <rect x="112" y="40" width="16" height="16" class="p orange-dark"/>
        <rect x="48" y="64" width="16" height="16" class="p ink"/>
        <rect x="96" y="64" width="16" height="16" class="p ink"/>
        <rect x="64" y="88" width="32" height="16" class="p ink-soft"/>
        <rect x="64" y="32" width="16" height="16" class="p cream"/>
        <rect x="96" y="32" width="16" height="16" class="p cream"/>
        <rect x="16" y="104" width="16" height="32" class="p accent"/>
        <rect x="128" y="104" width="16" height="32" class="p accent"/>
      </svg>
      <div class="mascot-label">
        <strong>CLAWD</strong>
        <span>always on screen</span>
      </div>
    </section>

    <section class="screen meter session-meter">
      <div class="meter-topline">
        <h2>Session</h2>
        <strong id="session-percent">0%</strong>
      </div>
      <div class="bar"><span id="session-bar"></span></div>
      <div class="meter-bottomline">
        <span>Reset</span>
        <span id="session-reset">--</span>
      </div>
    </section>

    <section class="screen meter weekly-meter">
      <div class="meter-topline">
        <h2>Weekly</h2>
        <strong id="weekly-percent">0%</strong>
      </div>
      <div class="bar"><span id="weekly-bar"></span></div>
      <div class="meter-bottomline">
        <span>Reset</span>
        <span id="weekly-reset">--</span>
      </div>
    </section>

    <section class="actions">
      <button id="refresh-button" type="button">更新</button>
      <p id="error" class="error" hidden></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
