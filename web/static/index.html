<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070707">
  <title>Clawdmeter Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen hero-screen">
      <div class="screen-chrome" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="hero-copy">
        <p class="eyebrow">CLAWDMETER WEB</p>
        <h1>CLAUDE<br>CODE</h1>
        <p class="subtitle">LANDSCAPE<br>PIXEL DASHBOARD</p>
      </div>
      <div class="status-row">
        <span id="status-dot" class="status-dot waiting"></span>
        <span id="status-text">WAITING</span>
        <span class="spacer"></span>
        <span id="updated-at">--:--</span>
      </div>
    </section>

    <section class="screen mascot-screen" aria-label="Orange pixel mascot">
      <div class="pixel-grid-bg" aria-hidden="true"></div>
      <div id="mascot-wrap" class="mascot-wrap mood-calm">
        <svg class="clawd-pixel" viewBox="0 0 320 180" role="img" aria-label="Orange pixel character" shape-rendering="crispEdges">
          <rect width="320" height="180" fill="transparent"/>
          <rect x="70" y="10" width="180" height="30" class="px-body px-shade"/>
          <rect x="70" y="40" width="180" height="30" class="px-body"/>
          <rect x="40" y="70" width="240" height="40" class="px-body"/>
          <rect x="20" y="80" width="20" height="30" class="px-body"/>
          <rect x="280" y="80" width="20" height="30" class="px-body"/>
          <rect x="70" y="110" width="180" height="30" class="px-body px-dark"/>
          <rect id="eye-left" x="100" y="55" width="20" height="38" class="px-eye"/>
          <rect id="eye-right" x="205" y="55" width="20" height="38" class="px-eye"/>
          <rect x="72" y="140" width="22" height="32" class="px-body"/>
          <rect x="110" y="140" width="22" height="32" class="px-body"/>
          <rect x="188" y="140" width="22" height="32" class="px-body"/>
          <rect x="226" y="140" width="22" height="32" class="px-body"/>
          <rect x="70" y="10" width="180" height="8" class="px-highlight"/>
        </svg>
      </div>
      <div class="mascot-label">
        <strong id="mascot-mode">IDLE</strong>
        <span id="mascot-caption">LOW USAGE</span>
      </div>
    </section>

    <section class="screen meter session-meter">
      <div class="meter-topline">
        <h2>SESSION</h2>
        <strong id="session-percent">0%</strong>
      </div>
      <div class="bar"><span id="session-bar"></span></div>
      <div class="meter-bottomline">
        <span>RESET</span>
        <span id="session-reset">--</span>
      </div>
    </section>

    <section class="screen meter weekly-meter">
      <div class="meter-topline">
        <h2>WEEKLY</h2>
        <strong id="weekly-percent">0%</strong>
      </div>
      <div class="bar"><span id="weekly-bar"></span></div>
      <div class="meter-bottomline">
        <span>RESET</span>
        <span id="weekly-reset">--</span>
      </div>
    </section>

    <section class="actions">
      <button id="refresh-button" type="button">UPDATE</button>
      <p id="error" class="error" hidden></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
