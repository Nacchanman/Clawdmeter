<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Clawdmeter Web</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero card">
      <p class="eyebrow">Clawdmeter Web</p>
      <h1>Claude Code Usage</h1>
      <p class="subtitle">iPhone の Safari で見る簡易ダッシュボード</p>
      <div class="status-row">
        <span id="status-dot" class="status-dot waiting"></span>
        <span id="status-text">待機中</span>
        <span class="spacer"></span>
        <span id="updated-at">--:--</span>
      </div>
    </section>

    <section class="meter card">
      <div class="meter-topline">
        <h2>Session</h2>
        <strong id="session-percent">0%</strong>
      </div>
      <div class="bar"><span id="session-bar"></span></div>
      <div class="meter-bottomline">
        <span>Reset</span>
        <span id="session-reset">--</span>
      </div>
    </section>

    <section class="meter card">
      <div class="meter-topline">
        <h2>Weekly</h2>
        <strong id="weekly-percent">0%</strong>
      </div>
      <div class="bar"><span id="weekly-bar"></span></div>
      <div class="meter-bottomline">
        <span>Reset</span>
        <span id="weekly-reset">--</span>
      </div>
    </section>

    <section class="actions">
      <button id="refresh-button" type="button">今すぐ更新</button>
      <p id="error" class="error" hidden></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
